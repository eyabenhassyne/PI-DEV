# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    dechets_upload_directory: '%kernel.project_dir%/public/uploads/dechets'
    profiles_upload_directory: '%kernel.project_dir%/public/uploads/profiles'
    partenaire_upload_directory: '%kernel.project_dir%/public/uploads/partenaire'
    huggingface_api_key: '%env(HUGGINGFACE_API_KEY)%'
    news_api_key: '%env(NEWS_API_KEY)%'
    openaq_api_key: '%env(OPENAQ_API_KEY)%'
    stripe_secret_key: '%env(STRIPE_SECRET_KEY)%'
    stripe_payout_currency: '%env(STRIPE_PAYOUT_CURRENCY)%'
    stripe_app_base_url: '%env(STRIPE_APP_BASE_URL)%'
    stripe_connected_account_country: '%env(STRIPE_CONNECTED_ACCOUNT_COUNTRY)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Service\VisionService:
        arguments:
            $apiKey: '%huggingface_api_key%'

    App\Service\NewsService:
        arguments:
            $apiKey: '%news_api_key%'

    App\Service\OpenAqService:
        arguments:
            $apiKey: '%openaq_api_key%'

    App\Service\StripeWithdrawService:
        arguments:
            $secretKey: '%stripe_secret_key%'
            $payoutCurrency: '%stripe_payout_currency%'
            $appBaseUrl: '%stripe_app_base_url%'
            $connectedAccountCountry: '%stripe_connected_account_country%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
